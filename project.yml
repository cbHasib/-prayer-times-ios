name: PrayerTimes
options:
  bundleIdPrefix: co.hasib
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  autoGenSchemes: true

settings:
  base:
    MARKETING_VERSION: "0.6.0"
    CURRENT_PROJECT_VERSION: "9"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  PrayerKit:
    path: PrayerKit

targets:
  PrayerTimesiOS:
    type: application
    platform: iOS
    sources:
      - path: PrayerTimesiOS
        excludes:
          - "**/README.md"
    dependencies:
      - package: PrayerKit
        product: PrayerKit
      - target: PrayerTimesWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.hasib.prayertimesios
        PRODUCT_NAME: Prayer Times
        INFOPLIST_FILE: PrayerTimesiOS/Supporting/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: PrayerTimesiOS/Supporting/PrayerTimesiOS.entitlements

  PrayerTimesWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PrayerTimesWidget
        excludes:
          - "**/README.md"
      - path: PrayerTimesiOS/App/PrayerFormatting.swift
      - path: PrayerTimesiOS/App/ManualSchedule.swift
    dependencies:
      - package: PrayerKit
        product: PrayerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.hasib.prayertimesios.widget
        PRODUCT_NAME: Prayer Times Widget
        INFOPLIST_FILE: PrayerTimesWidget/Supporting/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: PrayerTimesWidget/Supporting/PrayerTimesWidget.entitlements

schemes:
  PrayerTimesiOS:
    build:
      targets:
        PrayerTimesiOS: all


